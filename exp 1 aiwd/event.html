<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register for the Future Web 2026 conference. Explore details and secure your spot today.">
    <title>Future Web 2026 | Registration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f1115;
            --surface-color: rgba(255, 255, 255, 0.05);
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --glow: 0 0 20px rgba(99, 102, 241, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Ambient Background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(99, 102, 241, 0.15) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
        }

        header {
            width: 100%;
            max-width: 1000px;
            margin: 40px auto;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #a5b4fc, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: var(--glow);
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* Media Section */
        .media-container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-bottom: 50px;
            padding: 0 20px;
        }

        .banner {
            width: 100%;
            border-radius: 16px;
            object-fit: cover;
            max-height: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease;
        }

        .banner:hover {
            transform: translateY(-5px);
        }

        .video-wrapper {
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            background: #000;
        }

        video {
            width: 100%;
            display: block;
        }

        audio {
            width: 100%;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            outline: none;
        }

        audio::-webkit-media-controls-panel {
            background-color: var(--surface-color);
        }
        
        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display {
            color: var(--text-main);
        }

        /* Registration Form */
        .form-container {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            margin: 0 20px 60px 20px;
        }

        .form-container h2 {
            font-size: 2rem;
            margin-bottom: 25px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #cbd5e1;
        }

        input[type="text"],
        input[type="email"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        /* Specific input styling */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        select option {
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        /* Radio Buttons */
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 8px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 400;
        }

        input[type="radio"] {
            accent-color: var(--primary-color);
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* File Upload */
        input[type="file"] {
            padding: 10px;
            background: transparent;
            border: 1px dashed var(--primary-color);
            cursor: pointer;
        }

        input[type="file"]::file-selector-button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
            margin-right: 15px;
        }

        input[type="file"]::file-selector-button:hover {
            background: var(--primary-hover);
        }

        /* Submit Button */
        input[type="submit"] {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="submit"]:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: var(--glow);
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .form-container { padding: 25px; }
            .radio-group { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Future Web 2026</h1>
        <p class="subtitle">The Premier Conference for Modern Web Technologies</p>
    </header>

    <div class="media-container">
        <!-- Event Banner Image -->
        <img src="https://images.unsplash.com/photo-1540575467063-178a50c2df87?q=80&w=2070&auto=format&fit=crop" alt="Future Web 2026 Event Banner" class="banner">

        <!-- Promotional Video -->
        <div class="video-wrapper">
            <video controls poster="https://images.unsplash.com/photo-1504384308090-c894fdcc538d?q=80&w=1000&auto=format&fit=crop">
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <!-- Background/Intro Audio -->
        <div class="form-group" style="margin-top: 10px;">
            <label>Listen to the Official Event Anthem:</label>
            <audio controls>
                <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>
    </div>

    <!-- Registration Form -->
    <div class="form-container">
        <h2>Register Now</h2>
        <form action="#" method="get" onsubmit="alert('Registration Successful!'); return false;">
            
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="john@example.com" required>
            </div>

            <div class="form-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" name="dob" required>
            </div>

            <div class="form-group">
                <label>Ticket Type</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="ticketType" value="standard" checked> Standard Pass
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="ticketType" value="vip"> VIP Pass
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="ticketType" value="student"> Student Pass
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="session">Preferred Workshop Session</label>
                <select id="session" name="session" required>
                    <option value="" disabled selected>Select a session</option>
                    <option value="frontend">Advanced Frontend Frameworks</option>
                    <option value="backend">Scalable Backend Systems</option>
                    <option value="ai">AI in Web Development</option>
                    <option value="design">UI/UX & Web Aesthetics</option>
                </select>
            </div>

            <div class="form-group">
                <label for="idUpload">Upload ID Proof (Optional)</label>
                <input type="file" id="idUpload" name="idUpload" accept=".pdf,.jpg,.png">
            </div>

            <div class="form-group">
                <label for="comments">Any Special Requirements / Dietary Restrictions?</label>
                <textarea id="comments" name="comments" placeholder="Let us know..."></textarea>
            </div>

            <input type="submit" value="Complete Registration">
        </form>
    </div>

</body>
</html>
