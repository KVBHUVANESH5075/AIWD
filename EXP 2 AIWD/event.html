<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Register for the Future Web 2026 conference. Explore details and secure your spot today.">
    <title>Future Web 2026 | Registration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Link to external CSS file for Experiment 2 -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Future Web 2026</h1>
        <p class="subtitle">The Premier Conference for Modern Web Technologies</p>
    </header>

    <div class="media-container">
        <!-- Event Banner Image -->
        <img src="https://images.unsplash.com/photo-1540575467063-178a50c2df87?q=80&w=2070&auto=format&fit=crop"
            alt="Future Web 2026 Event Banner" class="banner">

        <!-- Promotional Video -->
        <div class="video-wrapper">
            <video controls
                poster="https://images.unsplash.com/photo-1504384308090-c894fdcc538d?q=80&w=1000&auto=format&fit=crop">
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <!-- Background/Intro Audio -->
        <div class="form-group" style="margin-top: 10px;">
            <label>Listen to the Official Event Anthem:</label>
            <audio controls>
                <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>
    </div>

    <!-- Registration Form -->
    <div class="form-container">
        <h2>Register Now</h2>
        <form action="#" method="get" onsubmit="alert('Registration Successful!'); return false;">

            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="john@example.com" required>
            </div>

            <div class="form-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" name="dob" required>
            </div>

            <div class="form-group">
                <label>Ticket Type</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="ticketType" value="standard" checked> Standard Pass
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="ticketType" value="vip"> VIP Pass
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="ticketType" value="student"> Student Pass
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="session">Preferred Workshop Session</label>
                <select id="session" name="session" required>
                    <option value="" disabled selected>Select a session</option>
                    <option value="frontend">Advanced Frontend Frameworks</option>
                    <option value="backend">Scalable Backend Systems</option>
                    <option value="ai">AI in Web Development</option>
                    <option value="design">UI/UX & Web Aesthetics</option>
                </select>
            </div>

            <div class="form-group">
                <label for="idUpload">Upload ID Proof (Optional)</label>
                <input type="file" id="idUpload" name="idUpload" accept=".pdf,.jpg,.png">
            </div>

            <div class="form-group">
                <label for="comments">Any Special Requirements / Dietary Restrictions?</label>
                <textarea id="comments" name="comments" placeholder="Let us know..."></textarea>
            </div>

            <input type="submit" value="Complete Registration">
        </form>
    </div>

</body>

</html>
